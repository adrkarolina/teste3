# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Workflow de Integração Contínua

on: #vai dizer onde o workflow deve ser executado
  pull_request:
    branches: [ "main" ] #toda vez que um pull request for aberto na main, o workflow será executado

jobs: #ações que serão executadas
  testes:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24.
    - run: npm install
    - run: npm test
